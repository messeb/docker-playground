# ── Gzip compression ─────────────────────────────────────────────────────────
gzip            on;
gzip_vary       on;
gzip_proxied    any;
gzip_comp_level 5;
gzip_types      text/plain text/css application/json
                application/javascript text/xml application/xml
                image/svg+xml font/woff2;

# ── Structured access log ─────────────────────────────────────────────────────
# Note: "main" is already defined in nginx.conf — use a different name here
log_format playground '$remote_addr  $request  $status  '
                      '$body_bytes_sent bytes  $request_time s  '
                      '"$http_user_agent"';

server {
    listen      80;
    server_name localhost;
    root        /usr/share/nginx/html;
    index       index.html;

    access_log  /var/log/nginx/access.log  playground;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "SAMEORIGIN"      always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "same-origin"     always;

    # ── Static pages ──────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ =404;
    }

    # ── Static assets — aggressive caching ───────────────────────────────────
    # Matches CSS, JS, fonts, and images by file extension
    location ~* \.(css|js|woff2?|ttf|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires            30d;
        add_header         Cache-Control "public, immutable";
        access_log         off;
        try_files          $uri =404;
    }

    # ── Health check — returns JSON ───────────────────────────────────────────
    # Exact match (=) is faster than a prefix match for a fixed path
    location = /health {
        add_header  Content-Type application/json;
        return 200  '{"status":"ok","service":"nginx-webserver"}';
    }

    # ── Simulated 500 error ───────────────────────────────────────────────────
    location = /error-500 {
        return 500;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404              /404.html;
    error_page 500 502 503 504  /50x.html;

    location = /404.html { internal; }
    location = /50x.html { internal; }
}
