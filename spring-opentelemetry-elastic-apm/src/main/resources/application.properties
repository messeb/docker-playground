spring.application.name=spring-otel-demo

# ── Tracing ────────────────────────────────────────────────────────────────────
# Sample 100% of requests. Reduce in production (e.g. 0.1 = 10%).
management.tracing.sampling.probability=1.0

# OTLP/HTTP endpoint for Elastic APM Server.
# Spring Boot posts spans to {endpoint}/v1/traces.
# Overridden by MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT env var in Docker.
management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:8200/v1/traces

# ── Logging ────────────────────────────────────────────────────────────────────
# Includes traceId and spanId in every log line — correlate logs with traces in Kibana.
logging.pattern.level=%5p [${spring.application.name},%X{traceId:-},%X{spanId:-}]
